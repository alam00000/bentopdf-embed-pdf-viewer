name: Build PDFium WASM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout embed-pdf-viewer
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          df -h

      - name: Build WASM via Docker
        run: |
          docker compose -f packages/pdfium/docker-compose.yml build pdfium-build
          docker compose -f packages/pdfium/docker-compose.yml run --rm pdfium-build

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfium-wasm
          path: |
            packages/pdfium/src/vendor/pdfium.wasm
            packages/pdfium/src/vendor/pdfium.js
            packages/pdfium/src/vendor/pdfium.cjs
            packages/pdfium/src/vendor/functions.ts
            packages/pdfium/src/vendor/runtime-methods.ts
