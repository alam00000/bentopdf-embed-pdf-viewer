name: Build PDFium WASM

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout embed-pdf-viewer
        uses: actions/checkout@v4

      - name: Install Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.70

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git /opt/depot-tools
          echo "/opt/depot-tools" >> $GITHUB_PATH

      - name: Fetch PDFium source
        run: |
          cd packages/pdfium
          mkdir -p pdfium-src
          cd pdfium-src
          git init
          git remote add origin https://pdfium.googlesource.com/pdfium.git
          git fetch --depth=1 origin main
          git checkout FETCH_HEAD

          cat > "$GITHUB_WORKSPACE/.gclient" <<'EOF'
          solutions = [
            { "name": "packages/pdfium/pdfium-src",
              "url":  "https://pdfium.googlesource.com/pdfium.git",
              "deps_file": "DEPS",
              "managed": False,
              "custom_deps": {},
            },
          ]
          EOF

          cd "$GITHUB_WORKSPACE"
          gclient sync --no-history --shallow --nohooks --deps=builder
          rm .gclient

      - name: Install PDFium build deps
        run: |
          sudo bash packages/pdfium/pdfium-src/build/install-build-deps.sh --no-prompt

      - name: Patch PDFium source with callout support
        run: |
          SRC=packages/pdfium/pdfium-src
          PATCH=packages/pdfium/build/patch

          cp -f "$PATCH/build/config/BUILDCONFIG.gn" "$SRC/build/config/BUILDCONFIG.gn"
          cp -f "$PATCH/build/toolchain/wasm/BUILD.gn" "$SRC/build/toolchain/wasm/BUILD.gn"
          cp -f "$PATCH/fpdfsdk/fpdf_annot.cpp" "$SRC/fpdfsdk/fpdf_annot.cpp"
          cp -f "$PATCH/public/fpdf_annot.h" "$SRC/public/fpdf_annot.h"
          cp -f "$PATCH/constants/annotation_common.h" "$SRC/constants/annotation_common.h"

      - name: Generate build config
        run: |
          cd packages/pdfium/pdfium-src
          gn gen out/wasm --args='is_debug=false treat_warnings_as_errors=false pdf_use_skia=false pdf_enable_xfa=false pdf_enable_v8=false is_component_build=false clang_use_chrome_plugins=false pdf_is_standalone=true use_debug_fission=false use_custom_libcxx=false use_sysroot=false pdf_is_complete_lib=true pdf_use_partition_alloc=false is_clang=false symbol_level=0 target_os="wasm" target_cpu="wasm"'

      - name: Build libpdfium.a
        run: |
          cd packages/pdfium/pdfium-src
          ninja -C out/wasm pdfium -v

      - name: Generate export lists
        run: |
          SRC=packages/pdfium/pdfium-src
          PDFIUM=packages/pdfium
          WS=$PDFIUM/build/wasm
          rm -rf "$WS" && mkdir -p "$WS"

          ( cd "$SRC" &&
            find public -path public/cpp -prune -o -name '*.h' -print |
            sort | sed 's|^|#include "|;s|$|"|' ) > "$WS/all.h"

          echo '#include "../build/code/cpp/ext_api.h"' >> "$WS/all.h"

          clang -std=c11 -I"$SRC" -I"build/code/cpp" \
                -fsyntax-only -Xclang -ast-dump=json "$WS/all.h" > "$WS/ast.json"

          node "$PDFIUM/build/generate-functions.mjs" "$WS/ast.json" "$WS"
          node "$PDFIUM/build/generate-runtime-methods.mjs" "$WS"

      - name: Compile WASM
        run: |
          cd packages/pdfium/build
          bash ./compile.esm.sh
          bash ./compile.sh

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pdfium-wasm
          path: |
            packages/pdfium/build/wasm/pdfium.wasm
            packages/pdfium/build/wasm/pdfium.js
            packages/pdfium/build/wasm/pdfium.cjs
            packages/pdfium/build/wasm/functions.ts
            packages/pdfium/build/wasm/runtime-methods.ts
